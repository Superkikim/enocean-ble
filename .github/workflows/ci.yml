name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Ruff
        run: ruff check .

      - name: MyPy
        run: mypy custom_components tests

      - name: Pytest
        run: pytest

      - name: Manifest sanity
        run: python scripts/check_manifest.py
